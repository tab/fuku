version: 1

x-readiness-log: &readiness-log
  type: log
  pattern: "Service ready"
  timeout: 30s

x-readiness-http: &readiness-http
  type: http
  timeout: 30s
  interval: 500ms

x-readiness-tcp: &readiness-tcp
  type: tcp
  timeout: 30s
  interval: 500ms

x-logs: &logs
  output: [stdout, stderr]

services:
  auth:
    dir: examples/bookstore/auth
    tier: foundation
    readiness: *readiness-log
    logs: *logs

  storage:
    dir: examples/bookstore/storage
    tier: foundation
    readiness: *readiness-log
    logs: *logs

  user:
    dir: examples/bookstore/user
    tier: platform
    readiness:
      <<: *readiness-tcp
      address: localhost:9090
    logs: *logs

  api:
    dir: examples/bookstore/api
    tier: platform
    readiness:
      <<: *readiness-http
      url: http://localhost:8080/health
    logs: *logs

  frontend-api:
    dir: examples/bookstore/frontend-api
    tier: edge
    readiness:
      <<: *readiness-http
      url: http://localhost:8081/health
    logs: *logs

defaults:
  profiles: [default]

profiles:
  default: "*"
  core: [api, frontend-api, storage]
  minimal: [api, storage]

concurrency:
  workers: 10

retry:
  attempts: 5
  backoff: 1s

logs:
  buffer: 500

logging:
  format: console
  level: info
