<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8cfe;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; }
      .sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>

  <!-- Light background -->
  <rect width="1280" height="640" fill="#f8f9fc"/>
  <rect width="1280" height="640" fill="url(#grad)"/>

  <!-- Terminal window with shadow -->
  <rect x="98" y="38" width="1084" height="440" rx="14" fill="rgba(0,0,0,0.08)"/>
  <rect x="100" y="36" width="1080" height="440" rx="12" fill="#1e1e2e" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="100" y="36" width="1080" height="40" rx="12" fill="#16161e"/>
  <rect x="100" y="64" width="1080" height="12" fill="#16161e"/>
  <circle cx="128" cy="56" r="7" fill="#ff5f57"/>
  <circle cx="152" cy="56" r="7" fill="#febc2e"/>
  <circle cx="176" cy="56" r="7" fill="#28c840"/>
  <text class="mono" x="640" y="61" text-anchor="middle" fill="#6c7086" font-size="13">fuku</text>

  <!-- Panel border -->
  <rect x="120" y="90" width="1040" height="340" rx="8" fill="none" stroke="#7D56F4" stroke-width="1.5"/>

  <!-- "services" title knockout -->
  <rect x="132" y="82" width="82" height="17" fill="#1e1e2e"/>
  <text class="mono" x="136" y="95" fill="#7D56F4" font-weight="bold" font-size="14">services</text>

  <!-- "running 5/5 ready" knockout -->
  <rect x="968" y="82" width="156" height="17" fill="#1e1e2e"/>
  <text class="mono" x="976" y="95" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="1040" y="95" fill="#cdd6f4" font-size="14"> 5/5 ready</text>

  <!-- Column headers -->
  <text class="mono" x="560" y="124" fill="#6c7086" font-size="13">status</text>
  <text class="mono" x="720" y="124" fill="#6c7086" font-size="13">cpu</text>
  <text class="mono" x="810" y="124" fill="#6c7086" font-size="13">mem</text>
  <text class="mono" x="900" y="124" fill="#6c7086" font-size="13">pid</text>
  <text class="mono" x="1000" y="124" fill="#6c7086" font-size="13">uptime</text>

  <!-- foundation -->
  <text class="mono" x="140" y="154" fill="#7D56F4" font-weight="bold" font-size="14">foundation</text>
  <text class="mono" x="156" y="176" fill="#5af78e" font-size="10">◉</text>
  <text class="mono" x="170" y="176" fill="#cdd6f4" font-size="14">auth</text>
  <text class="mono" x="560" y="176" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="720" y="176" fill="#a6adc8" font-size="14">0.1%</text>
  <text class="mono" x="818" y="176" fill="#a6adc8" font-size="14">2MB</text>
  <text class="mono" x="896" y="176" fill="#a6adc8" font-size="14">76741</text>
  <text class="mono" x="1000" y="176" fill="#a6adc8" font-size="14">00:11</text>

  <text class="mono" x="156" y="198" fill="#5af78e" font-size="10">◉</text>
  <text class="mono" x="170" y="198" fill="#cdd6f4" font-size="14">storage</text>
  <text class="mono" x="560" y="198" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="720" y="198" fill="#a6adc8" font-size="14">0.1%</text>
  <text class="mono" x="818" y="198" fill="#a6adc8" font-size="14">2MB</text>
  <text class="mono" x="896" y="198" fill="#a6adc8" font-size="14">76742</text>
  <text class="mono" x="1000" y="198" fill="#a6adc8" font-size="14">00:11</text>

  <!-- platform -->
  <text class="mono" x="140" y="232" fill="#7D56F4" font-weight="bold" font-size="14">platform</text>
  <text class="mono" x="156" y="254" fill="#5af78e" font-size="10">◉</text>
  <text class="mono" x="170" y="254" fill="#cdd6f4" font-size="14">api</text>
  <text class="mono" x="560" y="254" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="720" y="254" fill="#a6adc8" font-size="14">0.1%</text>
  <text class="mono" x="818" y="254" fill="#a6adc8" font-size="14">2MB</text>
  <text class="mono" x="896" y="254" fill="#a6adc8" font-size="14">76758</text>
  <text class="mono" x="1000" y="254" fill="#a6adc8" font-size="14">00:09</text>

  <text class="mono" x="156" y="276" fill="#5af78e" font-size="10">◉</text>
  <text class="mono" x="170" y="276" fill="#cdd6f4" font-size="14">user</text>
  <text class="mono" x="560" y="276" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="720" y="276" fill="#a6adc8" font-size="14">0.1%</text>
  <text class="mono" x="818" y="276" fill="#a6adc8" font-size="14">2MB</text>
  <text class="mono" x="896" y="276" fill="#a6adc8" font-size="14">76759</text>
  <text class="mono" x="1000" y="276" fill="#a6adc8" font-size="14">00:09</text>

  <!-- edge -->
  <text class="mono" x="140" y="310" fill="#7D56F4" font-weight="bold" font-size="14">edge</text>
  <text class="mono" x="156" y="332" fill="#5af78e" font-size="10">◉</text>
  <text class="mono" x="170" y="332" fill="#cdd6f4" font-size="14">frontend</text>
  <text class="mono" x="560" y="332" fill="#5af78e" font-size="14">running</text>
  <text class="mono" x="720" y="332" fill="#a6adc8" font-size="14">0.1%</text>
  <text class="mono" x="818" y="332" fill="#a6adc8" font-size="14">2MB</text>
  <text class="mono" x="896" y="332" fill="#a6adc8" font-size="14">76772</text>
  <text class="mono" x="1000" y="332" fill="#a6adc8" font-size="14">00:09</text>

  <!-- Bottom border stats knockout -->
  <rect x="132" y="423" width="170" height="17" fill="#1e1e2e"/>
  <text class="mono" x="138" y="436" fill="#6c7086" font-size="14">cpu 6.2% • mem 25MB</text>

  <rect x="1050" y="423" width="72" height="17" fill="#1e1e2e"/>
  <text class="mono" x="1056" y="436" fill="#cdd6f4" font-size="14">v0.16.0</text>

  <!-- Title and tagline below terminal -->
  <text class="sans" x="640" y="536" text-anchor="middle" fill="#1a1a2e" font-size="44" font-weight="700">fuku</text>
  <text class="sans" x="640" y="574" text-anchor="middle" fill="#64648a" font-size="21">Lightweight CLI orchestrator for local services</text>

  <!-- URL -->
  <text class="mono" x="640" y="616" text-anchor="middle" fill="#5b8cfe" font-size="15">getfuku.sh</text>
</svg>
