name: Release
on:
  release:
    types: [ released ]
jobs:
  verify:
    name: Verify
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      GO_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run tests
        run: make test:race
      - name: Build
        run: make build
      - name: Run e2e tests
        run: make test:e2e
  release:
    name: Release
    needs: verify
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run GoReleaser
        # NOTE: https://github.com/goreleaser/goreleaser-action/releases/tag/v7.0.0
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  plugin:
    name: JetBrains Plugin
    needs: verify
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build plugin
        working-directory: plugins/jetbrains
        run: ./gradlew buildPlugin
      - name: Upload plugin to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          shopt -s nullglob
          PLUGIN_ZIP=(plugins/jetbrains/build/distributions/*.zip)
          if [ ${#PLUGIN_ZIP[@]} -ne 1 ]; then
            echo "Expected one plugin ZIP, found ${#PLUGIN_ZIP[@]}" >&2
            exit 1
          fi
          gh release upload "$TAG" "${PLUGIN_ZIP[0]}#fuku-jetbrains-${TAG#v}.zip"
  sentry:
    name: Sentry Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Sentry CLI
        run: curl -sL https://sentry.io/get-cli/ | bash
      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          RELEASE="fuku@${VERSION}"
          sentry-cli releases new "$RELEASE"
          sentry-cli releases set-commits "$RELEASE" --auto
          sentry-cli releases finalize "$RELEASE"
