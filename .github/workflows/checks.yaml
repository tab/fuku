name: Checks
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true
jobs:
  linter:
    name: Linter
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        # NOTE: https://github.com/golangci/golangci-lint-action/releases/tag/v9.2.0
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.11.3
  vet:
    name: Vet
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: go vet
        run: make vet
  static-check:
    name: Staticcheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: static-check
        # NOTE: https://github.com/dominikh/staticcheck-action/releases/tag/v1.4.0
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431
        with:
          install-go: false
  tests:
    name: Tests
    permissions:
      contents: read
      pull-requests: write
    env:
      GO_ENV: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [ '1.25', '1.26' ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.version }}
      - name: Run tests
        run: make test:race
  e2e:
    name: E2E
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: make build
      - name: Run tests
        run: make test:e2e
  plugin:
    name: Plugin
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint
        working-directory: plugins/jetbrains
        run: ./gradlew ktlintCheck
      - name: Build
        working-directory: plugins/jetbrains
        run: ./gradlew buildPlugin
  coverage:
    name: Codecov
    needs: [linter, vet, static-check, tests, e2e]
    permissions:
      contents: read
      pull-requests: write
    env:
      GO_ENV: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run coverage
        run: make test:race
      - name: Upload coverage to Codecov
        # NOTE: https://github.com/codecov/codecov-action/releases/v5.5.4
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
